name: gate

# The pre-commit gate (RUST_CONVENTIONS.md / ENFORCEMENT.md), enforced at the
# repository level so a red gate fails visibly in CI — not only when someone
# happens to run clippy locally or when the agent PostToolUse hook fires.
#
#   cargo fmt --all -- --check
#   cargo clippy --all-targets -- -D warnings
#   cargo test --workspace

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable + rustfmt + clippy)
        run: rustup toolchain install stable --profile minimal --component rustfmt clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
    